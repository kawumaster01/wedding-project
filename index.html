<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Our Wedding</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #f8f3e8, #f4d6c7);
            color: #333;
        }
        header {
            text-align: center;
            padding: 50px;
            background: linear-gradient(to bottom, #fff, #f7f7f7);
        }
        h1 {
            font-size: 3em;
            color: #d4af37; /* gold color */
        }
        form {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #d4af37; /* gold */
            color: white;
            padding: 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #ab8b2b; /* darker gold for hover effect */
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Wedding Celebration!</h1>
        <p>We are so excited to celebrate this special day with you!</p>
    </header>
    <form id="wishForm">
        <h2>Submit Your Wishes</h2>
        <input type="text" id="name" name="name" placeholder="Your Name" required>
        <input type="email" id="email" name="email" placeholder="Your Email" required>
        <textarea id="wish" name="wish" rows="4" placeholder="Your Wish..." required></textarea>
        <button type="submit">Send Wish</button>
    </form>
</body>
</html>
